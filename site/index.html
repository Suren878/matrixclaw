<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MATRIX CLAW</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050807;
      --ink: #eef8e8;
      --muted: #a8b3a3;
      --green: #7cff9b;
      --green-strong: #1dff72;
      --amber: #e3c36a;
      --line: rgba(124, 255, 155, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #050807;
    }

    .shade {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(5, 8, 7, 0.96) 0%, rgba(5, 8, 7, 0.68) 48%, rgba(5, 8, 7, 0.2) 100%),
        linear-gradient(180deg, rgba(5, 8, 7, 0.25) 0%, rgba(5, 8, 7, 0.8) 100%);
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 56px;
    }

    .hero {
      width: min(820px, 100%);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--amber);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(54px, 11vw, 132px);
      line-height: 0.86;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(29, 255, 114, 0.32),
        0 0 58px rgba(29, 255, 114, 0.18);
    }

    .copy {
      max-width: 620px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.55;
    }

    .command {
      width: min(760px, 100%);
      margin-top: 34px;
      border: 1px solid var(--line);
      background: rgba(7, 14, 10, 0.78);
      box-shadow: 0 0 44px rgba(29, 255, 114, 0.08);
    }

    .bar {
      display: flex;
      gap: 8px;
      align-items: center;
      height: 34px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      opacity: 0.85;
    }

    pre {
      margin: 0;
      overflow-x: auto;
      padding: 18px;
      color: #d7ffe0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(13px, 2vw, 17px);
      line-height: 1.45;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 22px;
      margin-top: 24px;
      font-size: 15px;
    }

    a {
      color: var(--green);
      text-decoration: none;
      border-bottom: 1px solid rgba(124, 255, 155, 0.45);
    }

    a:hover {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    @media (max-width: 720px) {
      main {
        align-items: flex-end;
        padding: 32px 22px;
      }

      .shade {
        background:
          linear-gradient(180deg, rgba(5, 8, 7, 0.28) 0%, rgba(5, 8, 7, 0.9) 72%),
          linear-gradient(90deg, rgba(5, 8, 7, 0.82), rgba(5, 8, 7, 0.42));
      }

      .copy {
        margin-top: 20px;
      }

      .command {
        margin-top: 24px;
      }
    }
  </style>
</head>
<body>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="shade" aria-hidden="true"></div>
  <main>
    <section class="hero" aria-label="MATRIX CLAW">
      <p class="eyebrow">local daemon / terminal / telegram</p>
      <h1>MATRIX<br>CLAW</h1>
      <p class="copy">A local AI coding operator with one daemon, durable SQLite state, reconnectable clients, and approval-aware tool execution.</p>
      <div class="command">
        <div class="bar" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <pre>curl -fsSL https://matrixclaw.foresko.com/install | bash</pre>
      </div>
      <nav class="links" aria-label="Project links">
        <a href="https://github.com/Suren878/matrixclaw">GitHub</a>
        <a href="https://github.com/Suren878/matrixclaw/releases">Releases</a>
        <a href="https://github.com/Suren878/matrixclaw/blob/main/SECURITY.md">Security</a>
      </nav>
    </section>
  </main>
  <script>
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");
    const glyphs = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&+-*/=<>[]{}";
    let columns = [];
    let width = 0;
    let height = 0;
    let fontSize = 18;

    function resize() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      fontSize = width < 720 ? 15 : 18;
      const count = Math.ceil(width / fontSize);
      columns = Array.from({ length: count }, () => ({
        y: Math.random() * -height,
        speed: 2 + Math.random() * 5,
        trail: 10 + Math.floor(Math.random() * 24),
        alpha: 0.35 + Math.random() * 0.55,
      }));
    }

    function frame() {
      ctx.fillStyle = "rgba(5, 8, 7, 0.18)";
      ctx.fillRect(0, 0, width, height);
      ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace`;
      ctx.textBaseline = "top";

      for (let i = 0; i < columns.length; i += 1) {
        const col = columns[i];
        const x = i * fontSize;
        for (let j = 0; j < col.trail; j += 1) {
          const y = col.y - j * fontSize;
          if (y < -fontSize || y > height + fontSize) continue;
          const fade = 1 - j / col.trail;
          const char = glyphs[(Math.random() * glyphs.length) | 0];
          const head = j === 0;
          ctx.fillStyle = head
            ? `rgba(238, 255, 232, ${Math.min(0.95, col.alpha + 0.2)})`
            : `rgba(29, 255, 114, ${Math.max(0.02, fade * col.alpha)})`;
          ctx.fillText(char, x, y);
        }

        col.y += col.speed;
        if (col.y - col.trail * fontSize > height) {
          col.y = Math.random() * -height * 0.45;
          col.speed = 2 + Math.random() * 5;
          col.trail = 10 + Math.floor(Math.random() * 24);
          col.alpha = 0.35 + Math.random() * 0.55;
        }
      }

      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", resize, { passive: true });
    resize();
    frame();
  </script>
</body>
</html>
