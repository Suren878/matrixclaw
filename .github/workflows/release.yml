name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build:
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          module_path="$(go list -m)"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w"
          ldflags="$ldflags -X ${module_path}/internal/version.Version=${VERSION}"
          ldflags="$ldflags -X ${module_path}/internal/version.Commit=${commit}"
          ldflags="$ldflags -X ${module_path}/internal/version.Date=${date}"

          package="matrixclaw-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${package}"
          go build -trimpath -ldflags "$ldflags" -o "dist/${package}/matrixclaw" ./cmd/matrixclaw
          go build -trimpath -ldflags "$ldflags" -o "dist/${package}/matrixclawd" ./cmd/matrixclawd
          cp LICENSE README.md "dist/${package}/"
          cp -R docs "dist/${package}/"
          mkdir -p "dist/${package}/scripts"
          cp scripts/README.md "dist/${package}/scripts/"
          cp scripts/install_voice_runtime.sh "dist/${package}/scripts/"
          tar -C "dist/${package}" -czf "dist/${package}.tar.gz" .

      - uses: actions/upload-artifact@v5
        with:
          name: matrixclaw-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
